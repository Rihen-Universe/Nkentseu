# =============================================================================
# NKCode — Manifeste d'icones (data-driven)
#
# Associe une EXTENSION de fichier a une icone, SANS recompiler l'application.
# Format d'une ligne :   .ext = NomIcone        (NomIcone = fichier PNG sans .png)
# Les lignes vides et celles commencant par '#' sont ignorees.
#
# OU deposer vos PNG (resolus dans cet ordre, le premier trouve gagne) :
#   1. Windows      : %APPDATA%\NKCode\icon\<NomIcone>.png
#      Linux/macOS  : ~/.config/nkcode/icon/<NomIcone>.png   (override utilisateur)
#   2. <app>/data/textures/icon/<NomIcone>.png               (defaut livre)
#
# Pour personnaliser une icone EXISTANTE (ex. le dossier), il suffit de deposer
# un PNG du meme nom (ex. OuvrirUnDossier.png) dans le dossier d'override.
#
# Ce fichier peut aussi etre copie dans le dossier d'override pour etendre/modifier
# la table ci-dessous. Si une icone reste introuvable, NKCode dessine une icone
# vectorielle generique en repli (aucune erreur).
# =============================================================================

